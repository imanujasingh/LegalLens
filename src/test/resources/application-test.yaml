spring:
  datasource:
    url: jdbc:h2:mem:legal_lens_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  ai:
    openai:
      api-key: test-api-key

logging:
  level:
    org.springframework: WARN
    org.hibernate: WARN
